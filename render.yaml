services:
  - type: web
    name: amit-portfolio-fullstack
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node server.js"
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: CONTACT_FROM_EMAIL
        sync: false
